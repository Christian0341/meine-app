<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>myHUB</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0c0c0c;
      --s1:        #161616;
      --s2:        #202020;
      --s3:        #2a2a2a;
      --border:    rgba(255,255,255,0.06);
      --border2:   rgba(255,255,255,0.1);
      --accent:    #d4d4d4;
      --accent-hi: #ffffff;
      --accent-lo: rgba(212,212,212,0.08);
      --text:      #ebebeb;
      --text2:     #808080;
      --text3:     #424242;
      --green:     #4ade80;
      --red:       #f87171;
      --green-dim: rgba(74,222,128,0.08);
      --red-dim:   rgba(248,113,113,0.08);
      --r:         12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(12,12,12,0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      height: 52px; padding: 0 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-logo { font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 700; color: var(--accent-hi); letter-spacing: -0.03em; }
    .brand-logo span { color: var(--text3); font-weight: 400; }
    .brand-sep { width: 1px; height: 16px; background: var(--s3); }
    .brand-sub { font-size: 11px; color: var(--text3); font-family: 'Geist Mono', monospace; letter-spacing: 0.05em; }
    .date-pill { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--text3); background: var(--s2); border: 1px solid var(--border); padding: 3px 9px; border-radius: 6px; letter-spacing: 0.05em; }

    /* ── Hero ── */
    .hero { padding: 24px 18px 18px; border-bottom: 1px solid var(--border); margin-bottom: 0; }
    .hero-tag { display: inline-flex; align-items: center; gap: 5px; font-family: 'Geist Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
    .hero-tag::before { content: ''; display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse-dot 3s ease infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
    .hero-title { font-size: 18px; font-weight: 600; line-height: 1.4; letter-spacing: -0.02em; color: var(--text); max-width: 380px; }
    .hero-title.skeleton { background: var(--s2); border-radius: 6px; color: transparent; height: 64px; animation: shimmer 1.8s ease infinite; }

    /* ── Nav ── */
    .nav-wrap { padding: 14px 18px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .nav-tabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .tab { flex-shrink: 0; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; font-family: 'Geist', sans-serif; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .tab:hover:not(.disabled) { background: var(--s2); color: var(--text2); border-color: var(--border2); }
    .tab.active { background: var(--s2); border-color: var(--border2); color: var(--text); }
    .tab.disabled { opacity: 0.25; cursor: default; }

    /* ── Sections ── */
    .section { display: none; padding: 0 18px 100px; }
    .section.active { display: block; }

    /* ── KI-News ── */
    .kategorie { margin-bottom: 28px; animation: fadeUp 0.3s ease both; }
    .kat-label { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .kat-line { flex: 1; height: 1px; background: var(--border); }
    .kat-text { font-family: 'Geist Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); white-space: nowrap; }
    .kat-count { font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--text3); }
    .artikel { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; margin-bottom: 8px; transition: background 0.15s, border-color 0.15s; }
    .artikel:hover { background: var(--s2); border-color: var(--border2); }
    .artikel-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 7px; }
    .artikel-titel { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; letter-spacing: -0.01em; }
    .sterne { font-size: 8px; flex-shrink: 0; margin-top: 3px; opacity: 0.7; }
    .artikel-body { font-size: 12px; font-weight: 300; color: var(--text2); line-height: 1.65; margin-bottom: 9px; }
    .artikel-insight { font-size: 11px; color: var(--accent); line-height: 1.55; margin-bottom: 11px; padding: 7px 11px; background: var(--accent-lo); border-radius: 6px; border-left: 1px solid var(--accent); opacity: 0.9; }
    .artikel-foot { display: flex; align-items: center; justify-content: space-between; }
    .artikel-quelle { font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; }
    .artikel-link { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--text2); text-decoration: none; transition: color 0.15s; }
    .artikel-link:hover { color: var(--accent-hi); }

    /* ── Aktien Dashboard ── */
    .stocks-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .stocks-title { font-family: 'Geist Mono', monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
    .stocks-updated { font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--text3); }

    .stock-card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      margin-bottom: 8px;
      transition: background 0.15s, border-color 0.15s;
      animation: fadeUp 0.3s ease both;
    }
    .stock-card:hover { background: var(--s2); border-color: var(--border2); }

    .stock-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .stock-left { flex: 1; }
    .stock-name { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; margin-bottom: 2px; }
    .stock-meta { font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--text3); letter-spacing: 0.05em; }

    .stock-right { text-align: right; }
    .stock-price { font-family: 'Geist Mono', monospace; font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
    .stock-change {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      margin-top: 3px;
    }
    .stock-change.pos { color: var(--green); background: var(--green-dim); }
    .stock-change.neg { color: var(--red); background: var(--red-dim); }
    .stock-change.neu { color: var(--text3); background: var(--s3); }

    /* Sparkline */
    .sparkline-wrap { margin-bottom: 10px; height: 36px; }
    .sparkline-wrap svg { width: 100%; height: 36px; display: block; }

    /* Performance-Zeile */
    .perf-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }
    .perf-cell { text-align: center; }
    .perf-label { font-family: 'Geist Mono', monospace; font-size: 8px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px; }
    .perf-val { font-family: 'Geist Mono', monospace; font-size: 11px; font-weight: 500; }
    .perf-val.pos { color: var(--green); }
    .perf-val.neg { color: var(--red); }
    .perf-val.neu { color: var(--text3); }

    /* Kennzahlen */
    .kenn-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .kenn-cell { }
    .kenn-label { font-family: 'Geist Mono', monospace; font-size: 8px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px; }
    .kenn-val { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text2); }

    /* 52W Bar */
    .week52-wrap { margin-bottom: 10px; }
    .week52-label { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .week52-l, .week52-h { font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--text3); }
    .week52-bar { height: 3px; background: var(--s3); border-radius: 2px; position: relative; }
    .week52-fill { position: absolute; top: 0; height: 3px; background: var(--accent); border-radius: 2px; }
    .week52-dot { position: absolute; top: -3px; width: 9px; height: 9px; border-radius: 50%; background: var(--accent-hi); border: 2px solid var(--bg); transform: translateX(-50%); }

    /* Fehler-Card */
    .stock-error { background: var(--s1); border: 1px dashed var(--border); border-radius: var(--r); padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .stock-error-name { font-size: 12px; color: var(--text3); }

    /* ── Coming Soon ── */
    .coming-soon { background: var(--s1); border: 1px dashed var(--border2); border-radius: var(--r); padding: 48px 20px; text-align: center; }
    .cs-emoji { font-size: 28px; margin-bottom: 12px; opacity: 0.5; }
    .cs-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; color: var(--text2); }
    .cs-text { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.05em; }

    /* ── Empty / Update ── */
    .empty { text-align: center; padding: 60px 20px; }
    .empty-emoji { font-size: 32px; margin-bottom: 14px; opacity: 0.4; }
    .empty-title { font-size: 15px; font-weight: 600; margin-bottom: 7px; color: var(--text2); }
    .empty-text { font-size: 12px; color: var(--text3); line-height: 1.7; font-family: 'Geist Mono', monospace; }
    .update-info { text-align: center; padding: 0 18px 14px; font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }

    /* ── Skeleton ── */
    .skel { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; margin-bottom: 8px; }
    .skel-l { height: 10px; background: var(--s2); border-radius: 4px; margin-bottom: 8px; animation: shimmer 1.8s ease infinite; }
    .skel-l.w3{width:30%} .skel-l.w6{width:60%} .skel-l.w8{width:80%}

    @keyframes shimmer { 0%,100%{opacity:.5} 50%{opacity:.2} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="brand-logo">my<span>HUB</span></div>
      <div class="brand-sep"></div>
      <div class="brand-sub">Dashboard</div>
    </div>
    <div class="date-pill" id="datumPill">–</div>
  </header>

  <div class="hero" id="heroWrap">
    <div class="hero-tag">Tagesthema</div>
    <div class="hero-title skeleton" id="heroTitle"></div>
  </div>

  <div class="update-info" id="updateInfo"></div>

  <div class="nav-wrap">
    <nav class="nav-tabs">
      <div class="tab active" onclick="showTab('news',this)">KI-News</div>
      <div class="tab" onclick="showTab('aktien',this)">Aktien</div>
      <div class="tab disabled">To-Dos</div>
      <div class="tab disabled">Rezepte</div>
      <div class="tab disabled">Skills</div>
    </nav>
  </div>

  <!-- KI-News -->
  <section class="section active" id="tab-news">
    <div id="digestContent">
      <div class="skel"><div class="skel-l w6"></div><div class="skel-l w8"></div><div class="skel-l w3"></div></div>
      <div class="skel"><div class="skel-l w6"></div><div class="skel-l w8"></div><div class="skel-l w3"></div></div>
      <div class="skel"><div class="skel-l w6"></div><div class="skel-l w8"></div></div>
    </div>
  </section>

  <!-- Aktien -->
  <section class="section" id="tab-aktien">
    <div class="stocks-header">
      <span class="stocks-title">Portfolio Übersicht · 21 Werte</span>
      <span class="stocks-updated" id="stocksUpdated">–</span>
    </div>
    <div id="stocksContent">
      <div class="skel"><div class="skel-l w6"></div><div class="skel-l w8"></div><div class="skel-l w3"></div></div>
      <div class="skel"><div class="skel-l w6"></div><div class="skel-l w8"></div></div>
    </div>
  </section>

  <!-- To-Dos -->
  <section class="section" id="tab-todos">
    <div class="coming-soon"><div class="cs-emoji">📋</div><div class="cs-title">To-Dos</div><div class="cs-text">Kommt bald</div></div>
  </section>

  <!-- Rezepte -->
  <section class="section" id="tab-rezepte">
    <div class="coming-soon"><div class="cs-emoji">🍞</div><div class="cs-title">Rezepte</div><div class="cs-text">Kommt bald</div></div>
  </section>

  <!-- Skills -->
  <section class="section" id="tab-skills">
    <div class="coming-soon"><div class="cs-emoji">🧠</div><div class="cs-title">Skills</div><div class="cs-text">Kommt bald</div></div>
  </section>

  <script>
    // ── Tab Navigation ──────────────────────────────────────
    function showTab(id, el) {
      if (el.classList.contains('disabled')) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('tab-' + id).classList.add('active');

      // Hero nur bei KI-News zeigen
      document.getElementById('heroWrap').style.display = id === 'news' ? 'block' : 'none';
      document.getElementById('updateInfo').style.display = id === 'news' ? 'block' : 'none';
    }

    function esc(s) {
      return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
    }

    function fmtPct(val) {
      if (val === null || val === undefined) return '–';
      const sign = val >= 0 ? '+' : '';
      return sign + val.toFixed(2) + '%';
    }

    function pctClass(val) {
      if (val === null || val === undefined) return 'neu';
      return val > 0 ? 'pos' : val < 0 ? 'neg' : 'neu';
    }

    function fmtPrice(val, currency) {
      if (val === null || val === undefined) return '–';
      const sym = currency === 'EUR' ? '€' : currency === 'USD' ? '$' : currency === 'GBP' ? '£' : (currency || '');
      return sym + val.toLocaleString('de-DE', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    // Sparkline SVG generieren
    function sparklineSVG(data, isPositive) {
      if (!data || data.length < 2) return '';
      const w = 300, h = 36, pad = 2;
      const min = Math.min(...data);
      const max = Math.max(...data);
      const range = max - min || 1;
      const pts = data.map((v, i) => {
        const x = pad + (i / (data.length - 1)) * (w - pad * 2);
        const y = h - pad - ((v - min) / range) * (h - pad * 2);
        return `${x},${y}`;
      });
      const color = isPositive ? '#4ade80' : '#f87171';
      const lastPt = pts[pts.length - 1].split(',');
      return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.8"/>
        <circle cx="${lastPt[0]}" cy="${lastPt[1]}" r="2.5" fill="${color}"/>
      </svg>`;
    }

    // 52-Wochen-Bar
    function week52Bar(price, low, high) {
      if (!price || !low || !high || high === low) return '';
      const pct = Math.max(0, Math.min(100, (price - low) / (high - low) * 100));
      return `
        <div class="week52-wrap">
          <div class="week52-label">
            <span class="week52-l">${low.toLocaleString('de-DE', {minimumFractionDigits:2})}</span>
            <span style="font-family:'Geist Mono',monospace;font-size:8px;color:var(--text3)">52W Range</span>
            <span class="week52-h">${high.toLocaleString('de-DE', {minimumFractionDigits:2})}</span>
          </div>
          <div class="week52-bar">
            <div class="week52-fill" style="width:${pct}%"></div>
            <div class="week52-dot" style="left:${pct}%"></div>
          </div>
        </div>`;
    }

    // ── KI-News laden ───────────────────────────────────────
    async function ladeDigest() {
      try {
        const d = await fetch('data/digest.json?v=' + Date.now()).then(r => r.json());
        document.getElementById('datumPill').textContent = d.datumISO || '–';
        const hero = document.getElementById('heroTitle');
        hero.classList.remove('skeleton');
        hero.textContent = d.tagesthema || '–';
        if (d.generiert_um) {
          const dt = new Date(d.generiert_um);
          document.getElementById('updateInfo').textContent =
            'Zuletzt aktualisiert · ' + dt.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'}) + ' Uhr';
        }
        const c = document.getElementById('digestContent');
        if (!d.kategorien?.length) {
          c.innerHTML = `<div class="empty"><div class="empty-emoji">◌</div><div class="empty-title">Noch kein Digest</div><div class="empty-text">Wird heute Nacht automatisch generiert.</div></div>`;
          return;
        }
        c.innerHTML = '';
        d.kategorien.forEach((kat, ki) => {
          const div = document.createElement('div');
          div.className = 'kategorie';
          div.style.animationDelay = (ki * 60) + 'ms';
          const artikel = (kat.artikel || []).map(a => `
            <div class="artikel">
              <div class="artikel-top">
                <div class="artikel-titel">${esc(a.titel)}</div>
                <div class="sterne">${esc(a.sterne||'')}</div>
              </div>
              <div class="artikel-body">${esc(a.zusammenfassung)}</div>
              ${a.einordnung ? `<div class="artikel-insight">${esc(a.einordnung)}</div>` : ''}
              <div class="artikel-foot">
                <span class="artikel-quelle">${esc(a.quelle||'')}</span>
                ${a.url ? `<a class="artikel-link" href="${esc(a.url)}" target="_blank" rel="noopener">↗ lesen</a>` : ''}
              </div>
            </div>`).join('');
          div.innerHTML = `
            <div class="kat-label">
              <span class="kat-text">${esc(kat.emoji||'')} ${esc(kat.titel)}</span>
              <div class="kat-line"></div>
              <span class="kat-count">${(kat.artikel||[]).length}</span>
            </div>${artikel}`;
          c.appendChild(div);
        });
      } catch(e) {
        document.getElementById('heroTitle').classList.remove('skeleton');
        document.getElementById('heroTitle').textContent = 'Digest nicht verfügbar';
        document.getElementById('digestContent').innerHTML =
          `<div class="empty"><div class="empty-emoji">⚠</div><div class="empty-title">Fehler</div><div class="empty-text">Bitte später nochmal versuchen.</div></div>`;
      }
    }

    // ── Aktien laden ────────────────────────────────────────
    async function ladeAktien() {
      try {
        const d = await fetch('data/stocks.json?v=' + Date.now()).then(r => r.json());

        if (d.aktualisiert) {
          const dt = new Date(d.aktualisiert);
          document.getElementById('stocksUpdated').textContent =
            dt.toLocaleDateString('de-DE') + ' · ' + dt.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
        }

        const c = document.getElementById('stocksContent');
        if (!d.aktien?.length) {
          c.innerHTML = `<div class="empty"><div class="empty-emoji">◌</div><div class="empty-title">Keine Daten</div><div class="empty-text">Wird täglich um 18:00 Uhr aktualisiert.</div></div>`;
          return;
        }

        c.innerHTML = '';
        d.aktien.forEach((s, i) => {
          const div = document.createElement('div');
          div.style.animationDelay = (i * 40) + 'ms';

          if (s.fehler) {
            div.className = 'stock-error';
            div.innerHTML = `<span style="color:var(--text3);font-size:11px">⚠</span><span class="stock-error-name">${esc(s.name)} — Keine Daten</span>`;
            c.appendChild(div);
            return;
          }

          div.className = 'stock-card';
          const isPos = (s.change_1d_pct || 0) >= 0;
          const spark = sparklineSVG(s.sparkline, isPos);

          div.innerHTML = `
            <div class="stock-top">
              <div class="stock-left">
                <div class="stock-name">${esc(s.name)}</div>
                <div class="stock-meta">${esc(s.ticker)} · WKN ${esc(s.wkn)}</div>
              </div>
              <div class="stock-right">
                <div class="stock-price">${fmtPrice(s.price, s.currency)}</div>
                <div class="stock-change ${pctClass(s.change_1d_pct)}">${fmtPct(s.change_1d_pct)}</div>
              </div>
            </div>
            ${spark ? `<div class="sparkline-wrap">${spark}</div>` : ''}
            ${week52Bar(s.price, s.week52_low, s.week52_high)}
            <div class="perf-row">
              <div class="perf-cell"><div class="perf-label">1 Tag</div><div class="perf-val ${pctClass(s.change_1d_pct)}">${fmtPct(s.change_1d_pct)}</div></div>
              <div class="perf-cell"><div class="perf-label">1 Woche</div><div class="perf-val ${pctClass(s.change_1w_pct)}">${fmtPct(s.change_1w_pct)}</div></div>
              <div class="perf-cell"><div class="perf-label">1 Monat</div><div class="perf-val ${pctClass(s.change_1m_pct)}">${fmtPct(s.change_1m_pct)}</div></div>
              <div class="perf-cell"><div class="perf-label">1 Jahr</div><div class="perf-val ${pctClass(s.change_1y_pct)}">${fmtPct(s.change_1y_pct)}</div></div>
            </div>
            <div class="kenn-row">
              <div class="kenn-cell"><div class="kenn-label">Dividende</div><div class="kenn-val">${s.div_rate ? s.currency === 'EUR' ? '€'+s.div_rate : '$'+s.div_rate : '–'}</div></div>
              <div class="kenn-cell"><div class="kenn-label">Div.-Rendite</div><div class="kenn-val">${s.div_yield ? s.div_yield.toFixed(2)+'%' : '–'}</div></div>
              <div class="kenn-cell"><div class="kenn-label">KGV</div><div class="kenn-val">${s.pe_ratio ? s.pe_ratio.toFixed(1) : '–'}</div></div>
              <div class="kenn-cell"><div class="kenn-label">Marktk.</div><div class="kenn-val">${s.market_cap || '–'}</div></div>
              <div class="kenn-cell"><div class="kenn-label">52W Hoch</div><div class="kenn-val">${s.week52_high ? s.week52_high.toLocaleString('de-DE',{minimumFractionDigits:2}) : '–'}</div></div>
              <div class="kenn-cell"><div class="kenn-label">52W Tief</div><div class="kenn-val">${s.week52_low ? s.week52_low.toLocaleString('de-DE',{minimumFractionDigits:2}) : '–'}</div></div>
            </div>`;

          c.appendChild(div);
        });

      } catch(e) {
        document.getElementById('stocksContent').innerHTML =
          `<div class="empty"><div class="empty-emoji">⚠</div><div class="empty-title">Fehler</div><div class="empty-text">Aktiendaten konnten nicht geladen werden.</div></div>`;
      }
    }

    ladeDigest();
    ladeAktien();
  </script>
</body>
</html>
