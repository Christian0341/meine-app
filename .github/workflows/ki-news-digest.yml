name: KI-News Digest

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --prefix scripts

      - name: Generate digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-digest.js

      - name: Commit digest
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/digest.json
          git diff --staged --quiet || git commit -m "KI-News Digest $(date +'%Y-%m-%d')"
          git push
